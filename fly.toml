# Fly.io deployment config. Rename `app` to your chosen Fly app name.
# Deploy:  fly launch --no-deploy   (first time, to create the app)
#          fly secrets set JUDGE_SECRET=<same-value-as-next.js>
#          fly deploy
app = "mentee-judge"
primary_region = "iad"   # match the Next.js app's Vercel region (iad1)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  WORK_ROOT = "/tmp/judge-runs"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      method = "GET"
      path = "/health"
      interval = "15s"
      timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
